name: 🚀 Build & Deploy Nectar Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nectar-production
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Deploy to Production
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🚀 Run Deployment Script
        run: |
          cd /home/robiul/vps/apps/nectar-api
          ./deploy.sh
