name: Build & Deploy Nectar Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd /home/robiul/vps/apps/nectar-api

          echo "Fetching latest code..."
          git fetch origin main
          git reset --hard origin/main

          echo "Installing dependencies..."
          npm ci

          echo "Building..."
          npm run build

          echo "Reloading PM2..."
          pm2 reload nectar-api --update-env

          echo "Deployment completed successfully."
