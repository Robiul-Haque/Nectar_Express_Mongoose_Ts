services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: nectar-api

    ports:
      - "8010:8010"

    env_file:
      - .env

    environment:
      - REDIS_URL=redis://redis:6379

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run dev

    stdin_open: true
    tty: true

    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8010/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: public.ecr.aws/docker/library/redis:alpine
    container_name: nectar-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

