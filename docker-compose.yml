version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: nectar-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run dev

    restart: unless-stopped

    depends_on:
      - mongo

  mongo:
    image: mongo:7

    container_name: nectar-mongo

    restart: unless-stopped

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_DATABASE: nectar

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: